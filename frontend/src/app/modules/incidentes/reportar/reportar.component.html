<div class="report-container">
  <div class="report-header">
    <h2>🚨 Solicitar Auxilio Mecánico</h2>
    <p>Cuéntanos qué pasó y un taller cercano acudirá en tu ayuda.</p>
  </div>

  <form [formGroup]="incidenteForm" (ngSubmit)="enviarIncidente()" class="report-form">
    
    <div class="form-group">
      <label>¿En qué vehículo te encuentras?</label>
      <select formControlName="vehiculo_id" class="form-input" 
              [class.error]="incidenteForm.get('vehiculo_id')?.invalid && incidenteForm.get('vehiculo_id')?.touched">
        <option value="" disabled selected>Selecciona tu vehículo</option>
        <option *ngFor="let v of misVehiculos" [value]="v.id">
          {{ v.placa }} - {{ v.marca }} {{ v.modelo }}
        </option>
      </select>
      <small class="error-text" *ngIf="incidenteForm.get('vehiculo_id')?.invalid && incidenteForm.get('vehiculo_id')?.touched">
        Debes seleccionar un vehículo para continuar.
      </small>
    </div>

    <div class="card bg-light mb-4">
      <div class="card-body">
        <label class="form-label fw-bold">
          <i class="bi bi-camera-fill me-2"></i>Evidencia del Incidente
        </label>
        
        <input 
          type="file" 
          #fileInput
          (change)="onFileSelected($event)" 
          accept="image/*"
          capture="environment" 
          style="display: none;">

        <div class="d-flex gap-2 align-items-center">
          <button type="button" class="btn btn-outline-secondary" (click)="fileInput.click()">
            <i class="bi bi-upload"></i> Seleccionar o Tomar Foto
          </button>
          <span class="text-muted small" *ngIf="!fotoSeleccionada">JPG, PNG, WEBP</span>
          <span class="text-success small fw-bold" *ngIf="fotoSeleccionada">¡Imagen cargada!</span>
        </div>

        <div *ngIf="imagePreview" class="mt-3 text-center">
          <img [src]="imagePreview" class="img-thumbnail shadow-sm" style="max-height: 180px;" alt="Vista previa">
          <button type="button" class="btn btn-sm btn-danger d-block mx-auto mt-2" (click)="resetearTodo()">Quitar foto</button>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>¿Cuál es el problema?</label>
      <select formControlName="categoria" class="form-input">
        <option value="bateria">Falla de Batería</option>
        <option value="llanta">Llanta Pinchada</option>
        <option value="motor">Problemas de Motor</option>
        <option value="choque">Choque / Colisión</option>
        <option value="otro">Otro / No lo sé</option>
      </select>
    </div>

    <div class="form-group">
      <label>Descripción del incidente</label>
      <div class="input-group">
        <textarea 
          class="form-control form-input" 
          formControlName="descripcion_manual" 
          rows="3" 
          placeholder="Ej: El auto no arranca y sale humo blanco...">
        </textarea>


       <button 
          type="button" 
          class="btn-voice" 
          [class.listening-active]="isListening"
          (click)="toggleDictado()"
          [title]="isListening ? 'Detener dictado' : 'Dictar por voz'">
          
          <i class="bi" [ngClass]="isListening ? 'bi-stop-circle-fill' : 'bi-mic-fill'"></i>
          
          <span *ngIf="isListening" class="recording-text">Grabando</span>
        </button>



      </div>
    </div>

    <div class="form-group">
      <label>📍 Ubicación exacta (Arrastra el marcador)</label>
      <div id="map" style="height: 250px; width: 100%; border-radius: 8px; margin-bottom: 5px;"></div>
      <input type="text" formControlName="ubicacion" class="form-input" readonly 
             style="background: #f0f0f0; font-size: 0.85rem; border-style: dashed;" placeholder="Coordenadas GPS">
    </div>

    <div class="form-group">
      <label>Referencia o Dirección escrita</label>
      <input 
        type="text"
        formControlName="direccion_texto" 
        placeholder="Ej: Av. Banzer entre 3er y 4to anillo"
        class="form-input"
        [class.error]="incidenteForm.get('direccion_texto')?.invalid && incidenteForm.get('direccion_texto')?.touched">
    </div>

    <button type="submit" class="btn-submit" [disabled]="incidenteForm.invalid || cargando">
      {{ cargando ? 'PROCESANDO...' : 'ENVIAR SOLICITUD DE AUXILIO' }}
    </button>
  </form>
</div>
