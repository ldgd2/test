<div class="perfil-wrap">

  <!-- FOTO -->
  <div class="avatar-zone">
    <div class="avatar-ring" (click)="fileInput.click()">
      <img *ngIf="fotoPreview" [src]="fotoPreview" alt="foto de perfil">
      <div *ngIf="!fotoPreview" class="avatar-initials">{{ iniciales }}</div>
      <div class="avatar-overlay">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-1.94c.04-.32.07-.64.07-.96s-.03-.66-.07-1l2.11-1.63a.5.5 0 0 0 .12-.64l-2-3.46a.49.49 0 0 0-.61-.22l-2.49 1a7.4 7.4 0 0 0-1.69-.98l-.38-2.65A.49.49 0 0 0 14 2h-4a.49.49 0 0 0-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1a.49.49 0 0 0-.61.22l-2 3.46a.5.5 0 0 0 .12.64L4.57 11a7 7 0 0 0-.07.96c0 .33.03.65.07.96L2.46 14.58a.5.5 0 0 0-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.58 1.69-.98l2.49 1.01c.22.08.49 0 .61-.22l2-3.46a.5.5 0 0 0-.12-.64l-2.11-1.66z"/>
        </svg>
      </div>
    </div>
    <input #fileInput type="file" accept="image/*" style="display:none" (change)="handleFoto($event)">
    <span class="avatar-hint">Clic para cambiar foto · máx 5 MB</span>
  </div>

  <form (ngSubmit)="handleGuardar()" #perfilForm="ngForm">

    <!-- DATOS PERSONALES -->
    <div class="pf-card">
      <p class="section-label">Información personal</p>
      <div class="grid2">
        <div class="field">
          <label>Nombres</label>
          <input type="text" name="nombres" [(ngModel)]="form.nombres" required>
        </div>
        <div class="field">
          <label>Apellidos</label>
          <input type="text" name="apellidos" [(ngModel)]="form.apellidos" required>
        </div>
        <div class="field full">
          <label>Correo electrónico</label>
          <input type="email" name="email" [(ngModel)]="form.email" required>
        </div>
        <div class="field full">
          <label>Teléfono</label>
          <input type="tel" name="telefono" [(ngModel)]="form.telefono" placeholder="+591 7xxxxxxx">
        </div>
      </div>
    </div>

    <!-- ROL Y ESTADO -->
    <div class="pf-card row-meta">
      <div>
        <p class="section-label" style="margin-bottom:6px">Tipo de cuenta</p>
        <span class="role-badge" [ngClass]="getBadgeClass()">{{ usuario?.tipo || 'cliente' }}</span>
      </div>
      <div class="toggle-wrap">
        <span class="toggle-label">Estado</span>
        <button type="button" class="toggle" [class.on]="form.activo" [class.off]="!form.activo"
                (click)="form.activo = !form.activo"></button>
        <span class="toggle-status" [class.activo]="form.activo">
          {{ form.activo ? 'Activo' : 'Inactivo' }}
        </span>
      </div>
    </div>

    <!-- SEGURIDAD -->
    <div class="pf-card">
      <p class="section-label">Seguridad</p>
      <div class="pass-grid">
        <div class="field full">
          <label>Contraseña actual</label>
          <input type="password" name="passActual" [(ngModel)]="passForm.passActual" placeholder="Ingresa tu contraseña actual">
        </div>
        <div class="field">
          <label>Nueva contraseña</label>
          <input type="password" name="passNueva" [(ngModel)]="passForm.passNueva" placeholder="Mínimo 8 caracteres">
        </div>
        <div class="field" [class.field-error]="passForm.passConfirm && passForm.passNueva !== passForm.passConfirm">
          <label>Confirmar nueva</label>
          <input type="password" name="passConfirm" [(ngModel)]="passForm.passConfirm" placeholder="Repite la contraseña">
        </div>
      </div>
    </div>

    <!-- MENSAJES -->
    <p *ngIf="error" class="msg msg-error">{{ error }}</p>
    <p *ngIf="exito" class="msg msg-ok">{{ exito }}</p>

    <!-- ACCIONES -->
    <div class="actions">
      <button type="button" class="btn-cancel" (click)="cancelar()">Cancelar</button>
      <button type="submit" class="btn-save" [disabled]="cargando">
        {{ cargando ? 'Guardando...' : 'Guardar cambios' }}
      </button>
    </div>

  </form>
</div>
